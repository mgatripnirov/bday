<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="flip-card">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <h1>Hi Darling, Happy Birthday </h1>
        <p>(click mo hehe)</p>
      </div>
      <div class="flip-card-back">
        <h1>I miss you, Gala nga tayo sama ka? 💕</h1>
        <p>(try mo muna click ung no)</p>
        <div class="arrow">⬅️ Click Yes!</div>
        <div class="buttons">
          <button id="btn-yes">Yes!</button>
          <button id="btn-no">No</button>
        </div>
        <p class="message" style="display: none;">Sino ba nagsabi pwede ka humindi hehe</p>
      </div>
    </div>
  </div>

  <div id="cover"></div>

  <div id="reveal">
    <div class="car-emoji">🚘</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
